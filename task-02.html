<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:linear-gradient(135deg,purple,blue);
            height:100vh;
            display:flex;
            justify-content: center;
            align-items: center;
            color:white;

        }
        .container{
            text-align: center;
            background:rgba(0,0,0,0.4);
            padding:30px;
            border-radius:15px;
            width:350px;
        } 
        h1{
    margin-bottom:20px;
}

    #display{
    font-size:40px;
    margin-bottom:20px;
    font-weight:bold;
}

     .buttons button{
        padding:10px 18px;
        margin:5px;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
}
    
.start{background:#28a745;color:white;}
.pause{background:#ffc107;color:black;}
.reset{background:#dc3545;color:white;}
.lap{background:#17a2b8;color:white;}

    button:hover{
    opacity:0.8;
}
    #laps{
    margin-top:20px;
    max-height:150px;
    overflow-y:auto;
    text-align:left;
}

    #laps li{
    padding:5px;
    border-bottom:1px solid rgba(255,255,255,0.3);
}



    </style>
</head>
<body>
    <div class="container">
        <h1>Stopwatch</h1>
        <div id="display">00:00:00</div>
        <div class="buttons">
            <button class="start" onclick="start()">Start</button>
            <button class="pause" onclick="pause()">Pause</button>
            <button class="reset" onclick="reset()">Reset</button>
            <button class="lap" onclick="lap()">Lap</button>
        </div>
        <ul id="laps"></ul>
    </div>

    <script>
        let seconds = 0;
        let minutes = 0;
        let hours = 0;

        let timer = null;
        function updateDisplay(){

    let h = hours < 10 ? "0"+hours : hours;
    let m = minutes < 10 ? "0"+minutes : minutes;
    let s = seconds < 10 ? "0"+seconds : seconds;

    document.getElementById("display").innerText = h+":"+m+":"+s;
}


        function stopwatch(){

    seconds++;

    if(seconds == 60){
        seconds = 0;
        minutes++;
    }

    if(minutes == 60){
        minutes = 0;
        hours++;
    }

    updateDisplay();
}
        function start(){
    if(timer !== null){
        clearInterval(timer);
    }

    timer = setInterval(stopwatch,1000);
}

function pause(){
    clearInterval(timer);
}
function reset(){

    clearInterval(timer);

    seconds = 0;
    minutes = 0;
    hours = 0;

    updateDisplay();

    document.getElementById("laps").innerHTML = "";
}
    function lap(){

    let time = document.getElementById("display").innerText;

    let li = document.createElement("li");
    li.innerText = "Lap : " + time;

    document.getElementById("laps").appendChild(li);
}


    </script>
</body>
</html>
